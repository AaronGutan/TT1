<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vis.js Timeline — пример</title>
    <script src="https://unpkg.com/vis-timeline@7.7.2/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@7.7.2/styles/vis-timeline-graph2d.min.css" rel="stylesheet"
        type="text/css" />
    <style type="text/css">
        body,
        html {
            font-family: sans-serif;
            margin: 0;
            padding: 1rem;
            box-sizing: border-box;
        }

        #visualization {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <h1>vis.js Timeline — демонстрация</h1>
    <p>Интерактивная временная шкала с группами элементов. Перетаскивайте элементы, масштабируйте колесом мыши.</p>
    <div id="visualization"></div>

    <script>
        // Контейнер для timeline
        var container = document.getElementById('visualization');

        // Группы элементов
        var groups = new vis.DataSet([
            { id: 1, content: 'Проект А', value: 1 },
            { id: 2, content: 'Проект Б', value: 2 },
            { id: 3, content: 'Проект В', value: 3 }
        ]);

        // Элементы временной шкалы
        var items = new vis.DataSet([
            // Проект А
            { id: 1, group: 1, content: 'Планирование', start: '2024-01-10', end: '2024-01-20', type: 'range', className: 'planning' },
            { id: 2, group: 1, content: 'Разработка', start: '2024-01-21', end: '2024-02-15', type: 'range' },
            { id: 3, group: 1, content: 'Релиз', start: '2024-02-16', type: 'point' },

            // Проект Б
            { id: 4, group: 2, content: 'Анализ требований', start: '2024-01-15', end: '2024-02-01', type: 'range' },
            { id: 5, group: 2, content: 'Прототип', start: '2024-02-02', end: '2024-02-20', type: 'range' },
            { id: 6, group: 2, content: 'Тестирование', start: '2024-02-21', end: '2024-03-05', type: 'range' },

            // Проект В
            { id: 7, group: 3, content: 'Начало', start: '2024-02-01', type: 'point' },
            { id: 8, group: 3, content: 'Основная фаза', start: '2024-02-05', end: '2024-03-10', type: 'range' },
            { id: 9, group: 3, content: 'Завершение', start: '2024-03-11', end: '2024-03-15', type: 'range' }
        ]);

        // Настройки timeline
        var options = {
            width: '100%',
            height: '400px',
            locale: 'ru',
            editable: true,
            zoomable: true,
            moveable: true,
            orientation: 'top',
            showCurrentTime: true,
            start: '2024-01-01',
            end: '2024-03-31',
            margin: { item: 20 },
            stack: true
        };

        // Создание timeline
        var timeline = new vis.Timeline(container, items, groups, options);

        // Обработчик событий (опционально)
        timeline.on('select', function (properties) {
            if (properties.items.length > 0) {
                var itemId = properties.items[0];
                var item = items.get(itemId);
                console.log('Выбран элемент:', item.content);
            }
        });
    </script>
</body>

</html>
